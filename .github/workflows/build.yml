name: Build Auto Trader

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: AIQuantLab_Trader-windows
            ext: .exe
          - os: macos-latest
            artifact: AIQuantLab_Trader-macos
            ext: ''
          - os: ubuntu-latest
            artifact: AIQuantLab_Trader-linux
            ext: ''

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller --clean --noconfirm auto_trader_gui.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/AIQuantLab_Trader${{ matrix.ext }}
          retention-days: 30
